<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SIMELATI Offline</title>
  <style>
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:#f5f7fa; color:#263238; }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { max-width:420px; width:100%; background:#fff; border:1px solid #e3ebf3; border-radius:16px; box-shadow:0 10px 24px rgba(20,30,44,.08); padding:24px; text-align:center; }
    .logo { width:72px; height:72px; object-fit:contain; margin-bottom:12px; }
    h1 { margin:0 0 8px; font-size:1.25rem; }
    p { margin:0; color:#5f6f7f; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img src="/assets/logo/simelati-logo.png" alt="SIMELATI" class="logo">
      <h1>SIMELATI sedang offline</h1>
      <p>Silakan cek koneksi internet Anda lalu coba kembali.</p>
    </div>
  </div>
</body>
</html>
